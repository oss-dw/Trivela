openapi: 3.1.0
info:
  title: Trivela API
  version: 0.1.0
  description: |
    REST API for the Trivela campaign and rewards platform. Handles campaign metadata,
    health checks, and Soroban RPC configuration for the frontend.

    See the [API Migration Guide](../docs/API_MIGRATION.md) for v0 → v1 breaking changes,
    endpoint changelog, deprecation policy, and migration examples with curl snippets.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:3001
    description: Local development server
  - url: https://api.trivela.example.com
    description: Production server

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Campaigns
    description: Campaign management operations
  - name: Config
    description: Configuration and metadata endpoints
  - name: Audit
    description: Audit log endpoints
  - name: Admin
    description: Administrative API key management
  - name: Organizations
    description: Organization and team member management

security:
  - ApiKeyAuth: []
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Check API and RPC health
      tags:
        - Health
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/rpc:
    get:
      summary: Check Soroban RPC health
      tags:
        - Health
      operationId: getRpcHealth
      security: []
      responses:
        '200':
          description: RPC is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcHealthResponse'
        '503':
          description: RPC is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RpcHealthResponse'

  /metrics:
    get:
      summary: Get Prometheus metrics
      tags:
        - Health
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Prometheus-format metrics
          content:
            text/plain:
              schema:
                type: string

  /api/v1:
    get:
      summary: Get API information
      tags:
        - Config
      operationId: getApiInfo
      security: []
      responses:
        '200':
          description: API metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiInfo'

  /api/v1/config:
    get:
      summary: Get public configuration
      tags:
        - Config
      operationId: getConfig
      security: []
      responses:
        '200':
          description: Public configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'

  /api/v1/explorer:
    get:
      summary: Get explorer links
      tags:
        - Config
      operationId: getExplorerLinks
      security: []
      responses:
        '200':
          description: Explorer configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExplorerResponse'

  /api/v1/campaigns:
    get:
      summary: List campaigns
      tags:
        - Campaigns
      operationId: listCampaigns
      security: []
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Items per page
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: offset
          in: query
          description: Number of items to skip
          schema:
            type: integer
            minimum: 0
        - name: active
          in: query
          description: Filter by active status
          schema:
            type: string
            enum: [true, false]
        - name: q
          in: query
          description: Full-text search query (supports phrases, prefix with *, boolean AND/OR/NOT)
          schema:
            type: string
        - name: tags
          in: query
          description: Comma-separated tags (any match includes campaign)
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
        - name: sort
          in: query
          description: Sort field
          schema:
            type: string
        - name: order
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Paginated campaign list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignListResponse'

    post:
      summary: Create a new campaign
      tags:
        - Campaigns
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreate'
      responses:
        '201':
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Slug conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/campaigns/{id}:
    get:
      summary: Get campaign by ID
      tags:
        - Campaigns
      operationId: getCampaignById
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: Campaign ID
          schema:
            type: string
      responses:
        '200':
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update campaign
      tags:
        - Campaigns
      operationId: updateCampaign
      parameters:
        - name: id
          in: path
          required: true
          description: Campaign ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdate'
      responses:
        '200':
          description: Campaign updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete campaign
      tags:
        - Campaigns
      operationId: deleteCampaign
      parameters:
        - name: id
          in: path
          required: true
          description: Campaign ID
          schema:
            type: string
      responses:
        '204':
          description: Campaign deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/campaigns/by-slug/{slug}:
    get:
      summary: Get campaign by slug
      tags:
        - Campaigns
      operationId: getCampaignBySlug
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          description: Campaign slug
          schema:
            type: string
      responses:
        '200':
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/campaigns/{id}/image:
    post:
      summary: Upload campaign image
      tags:
        - Campaigns
      operationId: uploadCampaignImage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  imageUrl:
                    type: string
                    format: uri
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Campaign not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/categories:
    get:
      summary: List categories with campaign counts
      tags:
        - Campaigns
      operationId: listCategories
      security: []
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        count:
                          type: integer

  /api/v1/tags:
    get:
      summary: List tags with frequency counts (top 50)
      tags:
        - Campaigns
      operationId: listTags
      security: []
      responses:
        '200':
          description: Tag list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        count:
                          type: integer

  /api/v1/admin/api-keys:
    get:
      summary: List API keys (metadata only)
      tags:
        - Admin
      operationId: listApiKeys
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKeyMetadata'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new API key
      tags:
        - Admin
      operationId: createApiKey
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: API key created (raw key returned once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  metadata:
                    $ref: '#/components/schemas/ApiKeyMetadata'

  /api/v1/admin/api-keys/{id}:
    delete:
      summary: Revoke an API key
      tags:
        - Admin
      operationId: revokeApiKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Key revoked
        '404':
          description: Key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/admin/api-keys/{id}/rotate:
    put:
      summary: Rotate an API key (revoke old, issue new)
      tags:
        - Admin
      operationId: rotateApiKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: New key issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  metadata:
                    $ref: '#/components/schemas/ApiKeyMetadata'

  /api/v1/audit-logs:
    get:
      summary: List audit logs
      tags:
        - Audit
      operationId: listAuditLogs
      parameters:
        - name: entity
          in: query
          description: Filter by entity type
          schema:
            type: string
        - name: entityId
          in: query
          description: Filter by entity ID
          schema:
            type: string
        - name: action
          in: query
          description: Filter by action
          schema:
            type: string
            enum: [create, update, delete]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Paginated audit log list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/indexer/cursor:
    get:
      summary: Get indexer cursor state
      tags:
        - Config
      operationId: getIndexerCursor
      security: []
      responses:
        '200':
          description: Cursor state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexerCursorState'

    post:
      summary: Update indexer cursor
      tags:
        - Config
      operationId: setIndexerCursor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndexerCursorUpdate'
      responses:
        '200':
          description: Cursor updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndexerCursorState'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations:
    post:
      summary: Create a new organization
      tags:
        - Organizations
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                slug:
                  type: string
                creatorEmail:
                  type: string
                  format: email
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations/{id}:
    get:
      summary: Get organization by ID
      tags:
        - Organizations
      operationId: getOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update organization
      tags:
        - Organizations
      operationId: updateOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                slug:
                  type: string
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete organization
      tags:
        - Organizations
      operationId: deleteOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Organization deleted
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations/{id}/members:
    get:
      summary: List organization members
      tags:
        - Organizations
      operationId: listMembers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrganizationMember'

  /api/v1/organizations/{id}/members/{memberId}:
    put:
      summary: Update member role
      tags:
        - Organizations
      operationId: updateMemberRole
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        '200':
          description: Member role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMember'
        '400':
          description: Validation error or invalid operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Remove member from organization
      tags:
        - Organizations
      operationId: removeMember
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Member removed
        '400':
          description: Invalid operation (e.g., removing last owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations/{id}/invitations:
    post:
      summary: Create team invitation
      tags:
        - Organizations
      operationId: createInvitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    enum: [invitation_created, invitation_exists, already_member, member_updated]
                  invitation:
                    $ref: '#/components/schemas/OrganizationInvitation'
                  inviteLink:
                    type: string
                  member:
                    $ref: '#/components/schemas/OrganizationMember'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      summary: List organization invitations
      tags:
        - Organizations
      operationId: listInvitations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, revoked, expired]
      responses:
        '200':
          description: List of invitations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrganizationInvitation'

  /api/v1/organizations/{id}/invitations/{invitationId}:
    delete:
      summary: Revoke invitation
      tags:
        - Organizations
      operationId: revokeInvitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: invitationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  invitation:
                    $ref: '#/components/schemas/OrganizationInvitation'
        '400':
          description: Invalid operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Invitation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations/invite/{token}:
    get:
      summary: Get invitation details by token
      tags:
        - Organizations
      operationId: getInvitationByToken
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation details
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  role:
                    type: string
                  organization:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                  status:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
        '404':
          description: Invitation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/organizations/invite/{token}/accept:
    post:
      summary: Accept invitation
      tags:
        - Organizations
      operationId: acceptInvitation
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  member:
                    $ref: '#/components/schemas/OrganizationMember'
                  organization:
                    $ref: '#/components/schemas/Organization'
        '400':
          description: Invalid invitation or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for write operations
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  schemas:
    Campaign:
      type: object
      required:
        - id
        - name
        - slug
        - description
        - active
        - featured
        - rewardPerAction
        - createdAt
        - updatedAt
        - status
      properties:
        id:
          type: string
          description: Campaign ID
        name:
          type: string
          description: Campaign name
        slug:
          type: string
          description: URL-friendly slug
        description:
          type: string
          description: Campaign description
        active:
          type: boolean
          description: Whether campaign is active
        featured:
          type: boolean
          description: Whether campaign is featured
        hidden:
          type: boolean
          description: Whether campaign is hidden
        hiddenReason:
          type: string
          nullable: true
          description: Reason for hiding campaign
        rewardPerAction:
          type: number
          description: Reward points per action
        startDate:
          type: string
          format: date-time
          nullable: true
          description: Campaign start date
        endDate:
          type: string
          format: date-time
          nullable: true
          description: Campaign end date
        status:
          type: string
          enum: [active, upcoming, ended]
          description: Computed campaign status
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
        imageUrl:
          type: string
          format: uri
          nullable: true
          description: Public URL for campaign image
        tags:
