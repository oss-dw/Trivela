groups:
  # ── Backend HTTP ────────────────────────────────────────────────────────────
  - name: trivela_backend
    interval: 30s
    rules:
      # 5xx error rate > 5% over 5 minutes
      - alert: HighBackendErrorRate
        expr: |
          (
            sum(rate(trivela_request_errors_total{job="trivela-backend"}[5m]))
            /
            sum(rate(trivela_requests_total{job="trivela-backend"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: 'Trivela backend 5xx error rate above 5%'
          description: >-
            Error rate is {{ $value | humanizePercentage }} over the last 5 minutes. Investigate
            backend logs immediately.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#backend-restart'

      # p95 request latency > 1 second (SLO breach)
      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(trivela_http_request_duration_ms_bucket{job="trivela-backend"}[5m])) by (le)
          ) > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Trivela p95 request latency above 1 second'
          description: >-
            The 95th-percentile request latency is {{ $value | humanizeDuration }} — above the 1 s
            SLO target. Identify slow routes in Grafana → Trivela API dashboard.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#latency-investigation'

      # Backend process restarted
      - alert: BackendProcessRestart
        expr: |
          increase(trivela_process_uptime_seconds{job="trivela-backend"}[5m]) < 0
        for: 0m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Trivela backend process restarted'
          description: 'The backend process restarted. Verify deployment or investigate crash.'
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#backend-restart'

      # Backend unreachable
      - alert: BackendDown
        expr: up{job="trivela-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: 'Trivela backend is unreachable'
          description:
            'Prometheus cannot scrape the backend /metrics endpoint. Service may be down.'
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#backend-restart'

      # Auth brute-force spike
      - alert: AuthFailureSpike
        expr: |
          sum(rate(trivela_auth_failures_total{job="trivela-backend"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Spike in failed authentication attempts'
          description: >-
            Failed auth attempts averaging {{ $value | humanize }}/s — possible brute-force or
            credential-stuffing. Check trivela_auth_lockouts_total and backend logs.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#auth-brute-force-lockout'

      # Auth lockout actively firing
      - alert: AuthLockoutTriggered
        expr: |
          increase(trivela_auth_lockouts_total{job="trivela-backend"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: 'Authentication lockout triggered'
          description: >-
            {{ $value }} brute-force lockout(s) in the last 5 minutes. Investigate source IPs.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#auth-brute-force-lockout'

  # ── RPC pool ────────────────────────────────────────────────────────────────
  - name: trivela_rpc
    interval: 30s
    rules:
      # All RPC endpoints unhealthy
      - alert: AllRpcEndpointsUnhealthy
        expr: trivela_rpc_pool_healthy{job="trivela-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: 'All Soroban RPC endpoints are unhealthy'
          description: >-
            Every endpoint in the RPC pool is marked unhealthy. Contract interactions will fail or
            fall back to the first endpoint. Check RPC node health.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#rpc-failover'

      # RPC pool saturation: callers waiting for a slot
      - alert: RpcPoolSaturated
        expr: trivela_rpc_pool_waiting{job="trivela-backend"} > 0
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'RPC pool is saturated — callers waiting'
          description: >-
            {{ $value }} caller(s) are queued waiting for an RPC pool slot. Requests beyond the
            acquire timeout will receive 503 POOL_SATURATED. Consider increasing PG_POOL_MAX or
            scaling the RPC tier.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#rpc-pool-saturation'

      # RPC health check endpoint down
      - alert: RPCHealthCheckDown
        expr: up{job="trivela-rpc-health"} == 0
        for: 2m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          summary: 'Trivela RPC health check endpoint unreachable'
          description: 'Cannot reach the /health/rpc endpoint. Check Soroban node connectivity.'
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#rpc-failover'

  # ── Indexer ─────────────────────────────────────────────────────────────────
  - name: trivela_indexer
    interval: 60s
    rules:
      # Indexer lag: cursor not advancing (staleness proxy)
      - alert: IndexerLag
        expr: |
          increase(trivela_indexer_events_processed_total{job="trivela-backend"}[10m]) == 0
            and trivela_indexer_running{job="trivela-backend"} == 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Trivela event indexer appears stalled'
          description: >-
            No events have been processed in the last 10 minutes while the indexer is reported
            running. The cursor may be stuck or the RPC connection lost.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#indexer-lag'

  # ── Contracts ────────────────────────────────────────────────────────────────
  - name: trivela_contracts
    interval: 60s
    rules:
      - alert: ContractPaused
        expr: |
          increase(trivela_contract_events_total{event_type="paused"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
          team: contracts
        annotations:
          summary: 'Trivela campaign contract has been PAUSED'
          description: >-
            A contract pause event was indexed. All campaign interactions are blocked.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#contract-pause-response'

      - alert: CampaignDBWriteErrors
        expr: |
          increase(trivela_db_write_errors_total{table="campaigns"}[5m]) > 5
        for: 2m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Campaign database write errors detected'
          description: '{{ $value }} DB write errors on the campaigns table in the last 5 minutes.'
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#db-backup-restore'

  # ── DLQ ─────────────────────────────────────────────────────────────────────
  - name: trivela_dlq
    interval: 60s
    rules:
      # Dead-letter queue growing (issue #650 — DLQ growth alert)
      - alert: DLQGrowth
        expr: |
          increase(trivela_dlq_size_total{job="trivela-backend"}[15m]) > 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Dead-letter queue is growing'
          description: >-
            {{ $value }} jobs added to the DLQ in the last 15 minutes. Background jobs are failing
            repeatedly. Review failed job logs for root cause.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#dlq-investigation'

  # ── Operator ─────────────────────────────────────────────────────────────────
  - name: trivela_operator
    interval: 120s
    rules:
      # Operator wallet balance low (issue #650 — operator low-balance alert)
      - alert: OperatorLowBalance
        expr: |
          trivela_operator_xlm_balance_stroops{job="trivela-backend"} < 50000000
        for: 5m
        labels:
          severity: warning
          team: contracts
        annotations:
          summary: 'Operator wallet balance is low'
          description: >-
            Operator XLM balance is {{ $value | humanize }} stroops (< 5 XLM). Transaction fees may
            fail. Top up the operator wallet immediately.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#operator-wallet-topup'

  # ── Synthetic canary ─────────────────────────────────────────────────────────
  - name: trivela_canary
    interval: 60s
    rules:
      # Canary journey failed
      - alert: CanaryJourneyFailed
        expr: |
          trivela_canary_success{job="trivela-canary"} == 0
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: 'Synthetic canary journey failed'
          description: >-
            The register→credit→claim canary on testnet has not succeeded for 5 minutes. Core user
            journey is broken. Check canary logs and RPC/contract health.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#canary-failure'

      # Canary latency above 30 seconds
      - alert: CanarySlowJourney
        expr: |
          trivela_canary_duration_seconds{job="trivela-canary"} > 30
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: 'Synthetic canary journey is slow'
          description: >-
            The register→credit→claim canary is taking {{ $value | humanizeDuration }}, above the 30
            s SLO. The Soroban RPC or contract may be degraded.
          runbook_url: 'https://github.com/FinesseStudioLab/Trivela/blob/main/docs/RUNBOOK.md#canary-failure'
