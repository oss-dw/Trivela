global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: mainnet
    project: trivela

rule_files:
  - 'alerting/alerting_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'trivela-backend'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['backend:3000']
    metrics_path: /metrics
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'trivela-backend'

  - job_name: 'trivela-rpc-health'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['backend:3000']
    metrics_path: /health
    params:
      format: ['prometheus']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'trivela-rpc'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
