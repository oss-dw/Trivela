services:
  # ── Blue/Green deployment variants ──────────────────────────────────────────
  # Only one of blue/green runs at a time in production.
  # Use DEPLOY_STRATEGY=blue-green with scripts/deploy-blue-green.sh.
  # In development, use the plain `backend` service below instead.

  backend-blue:
    image: ${DEPLOY_IMAGE:-node:20-alpine}
    working_dir: /app/backend
    command: node src/server.js
    profiles: ['blue-green']
    environment:
      PORT: 3001
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app/backend
      - backend_blue_modules:/app/backend/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/health | grep -q status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend-green:
    image: ${DEPLOY_IMAGE:-node:20-alpine}
    working_dir: /app/backend
    command: node src/server.js
    profiles: ['blue-green']
    environment:
      PORT: 3001
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
    ports:
      - '3002:3001'
    volumes:
      - ./backend:/app/backend
      - backend_green_modules:/app/backend/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3001/health | grep -q status || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Development services (default profile) ──────────────────────────────────

  backend:
    image: node:20-alpine
    working_dir: /app/backend
    command: sh -c "npm install && npm run dev"
    environment:
      PORT: 3001
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      STELLAR_NETWORK: testnet
    ports:
      - '3001:3001'
    volumes:
      - ./:/app
      - backend_node_modules:/app/backend/node_modules

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://backend:3001
      VITE_STELLAR_NETWORK: testnet
    depends_on:
      - backend
    ports:
      - '5173:5173'
    volumes:
      - ./:/app
      - frontend_node_modules:/app/frontend/node_modules

  redis:
    image: redis:7-alpine
    profiles: ['redis']
    ports:
      - '6379:6379'

  jaeger:
    image: jaegertracing/all-in-one:1.62
    profiles: ['tracing']
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'
      - '4318:4318'
      - '4317:4317'

  postgres:
    image: postgres:16-alpine
    profiles: ['postgres']
    environment:
      POSTGRES_USER: trivela
      POSTGRES_PASSWORD: trivela
      POSTGRES_DB: trivela
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trivela -d trivela']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_node_modules:
  backend_blue_modules:
  backend_green_modules:
  frontend_node_modules:
  postgres_data: